name: Beta Release

on:
  push:
    tags:
      - "v*-beta.*"

permissions:
  contents: write

jobs:
  android-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches pubspec version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -n 1 | sed 's/version:[[:space:]]*//')
          BUILD_NAME="${VERSION_LINE%%+*}"
          if [ "$TAG" != "$BUILD_NAME" ]; then
            echo "Tag version ($TAG) does not match pubspec build-name ($BUILD_NAME)"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-android-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
